services:
  api:
    build:
      context: .
    environment:
      DATABASE_URL: sqlite:////app/runtime/movies.db
      MOVIES_SEED_PATH: /app/data/movies.json
    ports:
      - "${API_PORT:-8080}:8000"
    volumes:
      - movies_data:/app/runtime
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/movies?limit=1', timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  movies_data:
